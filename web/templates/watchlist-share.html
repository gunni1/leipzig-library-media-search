<div class="mt-4 p-4 bg-slate-50 border border-slate-200 rounded-xl">
    <p class="text-sm font-medium text-slate-700 mb-2">Merkliste teilen</p>
    <p class="text-xs text-slate-500 mb-3">
        Diesen Link auf einem anderen Gerät öffnen, um dieselbe Merkliste zu verwenden.
        Eine dort bereits vorhandene Merkliste wird dabei ersetzt.
    </p>
    <div class="flex gap-2">
        <input id="share-url"
               type="text"
               readonly
               value="{{ . }}"
               class="flex-1 text-xs px-3 py-2 bg-white border border-slate-200 rounded-lg text-slate-700 select-all focus:outline-none focus:ring-2 focus:ring-slate-300" />
        <button onclick="navigator.clipboard.writeText(document.getElementById('share-url').value).then(() => { this.textContent = '✓'; setTimeout(() => this.textContent = 'Kopieren', 1500); })"
                class="px-3 py-2 text-xs bg-slate-700 hover:bg-slate-800 text-white rounded-lg transition-colors whitespace-nowrap">
            Kopieren
        </button>
    </div>
    <div class="mt-3 text-right">
        <button onclick="document.getElementById('share-panel').innerHTML = ''"
                class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
            Schließen
        </button>
    </div>
</div>
