{{ range .Branches }}
<div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
    <!-- Branch Header -->
    <div class="mb-4 pb-3 border-b-2 border-slate-100">
        <h2 class="text-xl font-bold text-slate-800">{{ .Branch }}</h2>
    </div>
    
    <!-- Items List -->
    <ul class="space-y-3">
        {{ range .Media }}
            <li class="group hover:bg-slate-50 rounded-xl p-4 transition-colors {{ if not .IsAvailable }}opacity-40{{ end }}">
                <div class="flex items-center justify-between gap-4">
                    <!-- Left: Title & Icon -->
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <!-- Platform Icon -->
                        <div class="flex-shrink-0">
                            {{ if eq .Platform "dvd" }}
                                <img src="icon_dvd.svg" class="w-6 h-6" alt="DVD icon">
                            {{ else if eq .Platform "bluray" }}
                                <img src="icon_bluray.svg" class="w-6 h-6" alt="Blu-ray icon">
                            {{ end }}
                        </div>
                        
                        <!-- Title -->
                        <span class="text-slate-800 font-medium truncate {{ if not .IsAvailable }}text-slate-200{{ end }}">
                            {{ .Title }}
                        </span>
                    </div>
                    
                    <!-- Right: Status/Button -->
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <!-- Star / Watchlist Button -->
                        <button
                            data-watchlist-btn
                            data-title="{{ .Title }}"
                            data-platform="{{ .Platform }}"
                            data-type="{{ $.MediaType }}"
                            class="text-2xl leading-none transition-colors text-slate-300 hover:text-yellow-400"
                            title="Zur Merkliste hinzufügen"
                        >☆</button>

                        {{ if not .IsAvailable }}
                            <button 
                                hx-get="/return-date/{{encodeBranch .Branch }}/{{ .Platform }}/{{urlquery .Title }}" 
                                hx-trigger="click"
                                class="px-4 py-2 text-slate-700 text-sm font-medium rounded-lg transition-colors"
                            >
                                <img src="return.svg" class="w-6 h-6" alt="Return date">
                            </button>
                        {{ end }}
                    </div>
                </div>
            </li>
        {{ end }}
    </ul>
</div>    
{{ end }}

<script>
(function () {
    function getWatchlist() {
        try { return JSON.parse(localStorage.getItem('watchlist') || '[]'); }
        catch (e) { return []; }
    }
    function saveWatchlist(list) {
        localStorage.setItem('watchlist', JSON.stringify(list));
    }
    function isStarred(title, type) {
        return getWatchlist().some(function(i) { return i.title === title && i.type === type; });
    }
    function updateButtons() {
        document.querySelectorAll('[data-watchlist-btn]').forEach(function(btn) {
            var starred = isStarred(btn.dataset.title, btn.dataset.type);
            btn.textContent = starred ? '★' : '☆';
            btn.classList.toggle('text-yellow-400', starred);
            btn.classList.toggle('text-slate-300', !starred);
        });
    }
    document.querySelectorAll('[data-watchlist-btn]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var title = this.dataset.title;
            var platform = this.dataset.platform;
            var type = this.dataset.type;
            var list = getWatchlist();
            var idx = list.findIndex(function(i) { return i.title === title && i.type === type; });
            if (idx >= 0) {
                list.splice(idx, 1);
            } else {
                list.push({ title: title, platform: platform, type: type });
            }
            saveWatchlist(list);
            updateButtons();
        });
    });
    updateButtons();
})();
</script>
