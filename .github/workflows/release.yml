name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build ARM64 Linux binary
        run: GOOS=linux GOARCH=arm64 go build -o bin/lib-api-arm64-linux main.go

      - name: Generate SHA256 checksum
        run: |
          cd bin
          sha256sum lib-api-arm64-linux > SHA256SUMS

      - name: Create GitHub Release and upload binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            bin/lib-api-arm64-linux \
            bin/SHA256SUMS
